<!doctype html>
<html>
  <head>
    <title>Kontak Rif'anna Fatkhuliya</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 40px;
        background-color: lightcyan;
      }

      h1 {
        text-align: center;
        background-color: lightskyblue;
        padding: 10px;
      }

      form {
        background-color: rgb(170, 206, 241);
        padding: 20px;
        width: 60%;
        margin: auto;
      }

      input,
      textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 15px;
      }

      button {
        padding: 8px 15px;
        background-color: lightskyblue;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background-color: deepskyblue;
      }

      .kembali {
        text-align: center;
        margin-top: 20px;
      }
      #hasil {
        text-align: center;
        margin-top: 20px;
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <h1>Form Kontak</h1>

    <form>
      <label>Nama:</label>
      <input type="text" id="nama" placeholder="Masukkan nama Anda" />

      <label>Email:</label>
      <input type="email" id="email" placeholder="Masukkan email Anda" />

      <label>Pesan:</label>
      <textarea id="pesan" rows="4" placeholder="Tulis pesan Anda di sini"></textarea>

      <button type="button" onclick="kirimPesan()">Kirim</button>
    </form>

    <p id="hasil"></p>

    <div class="kembali">
      <a href="index.html">Kembali ke Halaman Utama</a>
    </div>

    <script>
      function kirimPesan() {
        let nama = document.getElementById("nama").value;
        let email = document.getElementById("email").value;
        let pesan = document.getElementById("pesan").value;

        if (nama === "" || email === "" || pesan === "") {
          alert("Silakan isi semua data terlebih dahulu!");
        } else {
          document.getElementById("hasil").innerHTML = "Pesan berhasil dikirim! <br> Terima kasih <b>" + nama + "</b> telah menghubungi.";
        }
      }
    </script>
  </body>
</html>
